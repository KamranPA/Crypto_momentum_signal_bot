# نام فایل: backtest.yml
# مسیر: .github/workflows/backtest.yml
#
# اجرای دستی از تب Actions ریپازیتوری (workflow_dispatch) -- دیتای تاریخی رو از
# Yahoo Finance + CoinEx می‌گیره، بک‌تست رو اجرا می‌کنه، و نتیجه رو مستقیم در
# پوشهٔ result/ کامیت می‌کنه تا نیازی به آپلود دستی جایی نباشه.
#
# نحوهٔ اجرا: تب Actions ریپو -> "Backtest" -> دکمهٔ "Run workflow"
# نتیجه: چند دقیقه بعد، فایل‌های result/history_*.csv و result/backtest_summary.csv
# مستقیم در ریپازیتوری قابل مشاهده‌ان (و در لاگ خودِ Action هم چاپ می‌شن).

name: Backtest

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch historical data (Yahoo Finance + CoinEx)
        run: python fetch_historical_data.py

      - name: Run backtest on all symbols
        run: python run_all_backtests.py

      - name: Commit results
        run: |
          git config user.name "backtest-bot"
          git config user.email "backtest-bot@users.noreply.github.com"
          git add result/
          git diff --cached --quiet || git commit -m "backtest results [skip ci]"
          git push
