# نام فایل: signal.yml
# مسیر: .github/workflows/signal.yml
#
# هر ۴ ساعت اجرا می‌شه (هم‌راستا با تایم‌فریم ۴ ساعته‌ای که استراتژی روش بک‌تست شده).
# Secrets لازم (در تنظیمات ریپازیتوری > Settings > Secrets and variables > Actions):
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID

name: Crypto Signal Bot

on:
  schedule:
    - cron: "5 */4 * * *"   # ۵ دقیقه بعد از هر ۴ ساعت (برای اطمینان از بسته‌شدن کندل)
  workflow_dispatch: {}       # امکان اجرای دستی از تب Actions

permissions:
  contents: write

jobs:
  run-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "signal-bot"
          git config user.email "signal-bot@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update signal state [skip ci]"
          git push
